<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segurança — GBS Serviços</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,sans-serif;background:#025e37}

.page{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.img-wrap{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
.img-wrap img{display:block;max-width:88vw;max-height:88vh;width:auto;height:auto;object-fit:contain}

.nav-overlay{position:absolute;top:0;right:0;display:flex;align-items:center;gap:1vw;
  padding:6px 16px 6px 20px;border-radius:0 0 0 10px;background:rgba(2,94,55,.55)}
.nav-overlay a{color:#fff;text-decoration:none;font-size:.85vw;font-weight:500}
.nav-overlay a.ativo{font-weight:700;border-bottom:2px solid #fff}
.nav-overlay a:hover{text-decoration:underline}
.nav-overlay .btn-link{font-weight:700;border:2px solid #fff;padding:.4vw 1.1vw;border-radius:6px;text-decoration:none}
.nav-overlay .btn-link:hover{background:#fff;color:#025e37}

@media(max-width:700px){
  .img-wrap img{max-width:96vw;max-height:92vh;object-fit:contain}
  .nav-overlay{gap:10px;padding:5px 10px 5px 14px}
  .nav-overlay a{font-size:11px}
  .nav-overlay .btn-link{padding:5px 10px}
}
</style>
</head>
<body>

<div class="page">
  <div class="img-wrap">
    <picture>
      <source media="(max-width:700px)" srcset="seguranca-mobile.png">
      <img src="seguranca.png" alt="Segurança GBS — Nosso compromisso, todos os dias. Prevenção, Atitude Segura, Regras que Salvam Vidas, Melhoria Contínua. Segurança é valor. É vida.">
    </picture>
    <div class="nav-overlay">
      <a href="index.html">A empresa</a>
      <a class="ativo" href="seguranca.html">Segurança</a>
      <a class="btn-link" href="#">Leiturista</a>
      <a class="btn-link" href="/controles/teste/index.html?logout=1">Controles</a>
    </div>
  </div>
</div>

</body>
</html>
